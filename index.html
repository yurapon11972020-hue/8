<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Поздравления с 8 марта | Колледж</title>
    <style>
        /* ========== СОВРЕМЕННЫЙ ЖЕНСТВЕННЫЙ ДИЗАЙН ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:wght@400;600;700&display=swap');

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            background: #fce7f0;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.3s;
            animation: bodyFadeIn 1s ease;
        }

        @keyframes bodyFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 200, 220, 0.4) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255, 180, 200, 0.4) 0%, transparent 35%),
                        radial-gradient(circle at 40% 80%, #ffd9e5 0%, transparent 40%);
            filter: blur(60px);
            z-index: 0;
            animation: floatBg 20s ease-in-out infinite alternate;
        }

        @keyframes floatBg {
            0% { transform: scale(1) translate(0, 0); opacity: 0.7; }
            100% { transform: scale(1.2) translate(-2%, -2%); opacity: 1; }
        }

        body.dark-theme {
            background: #0a0a0a;
        }
        body.dark-theme::before {
            display: none;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            border-radius: 48px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            min-height: 600px;
            background: rgba(255, 250, 250, 0.3);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            z-index: 10;
            position: relative;
            transition: background 0.4s, border-color 0.3s, transform 0.3s;
            animation: containerScaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes containerScaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        body.dark-theme .container {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px) saturate(150%);
            border-color: rgba(151, 154, 170, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }

        .sidebar {
            width: 220px;
            padding: 30px 0 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            border-right: 1px solid rgba(255, 182, 193, 0.4);
            background: rgba(255, 240, 245, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
        }

        body.dark-theme .sidebar {
            background: rgba(30, 30, 30, 0.5);
            border-right-color: rgba(151, 154, 170, 0.3);
        }

        .sidebar button {
            width: 160px;
            padding: 14px 12px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            color: #b3435e;
            box-shadow: 0 8px 20px rgba(255, 160, 180, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
            font-weight: 600;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .sidebar button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .sidebar button:hover::after {
            width: 200px;
            height: 200px;
        }

        .sidebar button:hover {
            transform: translateY(-3px) scale(1.02);
            background: #ffb6c9;
            color: white;
            box-shadow: 0 15px 25px rgba(255, 120, 160, 0.4);
            border-color: #ffb6c9;
        }

        .sidebar button.active {
            background: linear-gradient(135deg, #ff8da1, #ffb3c6);
            color: white;
            border-color: white;
            box-shadow: 0 10px 20px rgba(255, 80, 140, 0.3);
        }

        .sidebar button.active::after {
            display: none;
        }

        body.dark-theme .sidebar button {
            background: #979aaa;
            color: #ffffff;
            border-color: #b0b5c5;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        body.dark-theme .sidebar button::after {
            background: rgba(255, 255, 255, 0.2);
        }

        body.dark-theme .sidebar button:hover {
            background: #aab0c0;
            color: white;
            border-color: #c0c5d5;
        }

        body.dark-theme .sidebar button.active {
            background: #7e8494;
            color: white;
            border-color: #979aaa;
        }

        .moderation-circle {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffb3c6, #ff8da1);
            border: 3px solid white;
            box-shadow: 0 10px 25px rgba(255, 80, 140, 0.4);
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 30;
            color: white;
            animation: pulseModeration 2s infinite;
        }

        @keyframes pulseModeration {
            0% { box-shadow: 0 0 0 0 rgba(255, 141, 161, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 141, 161, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 141, 161, 0); }
        }

        .moderation-circle:hover {
            transform: translateX(-50%) scale(1.1) rotate(5deg);
            background: linear-gradient(145deg, #ffc0d0, #ff7088);
            box-shadow: 0 15px 30px rgba(255, 0, 100, 0.5);
            animation: none;
        }

        body.dark-theme .moderation-circle {
            background: #979aaa;
            border-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            animation: pulseModerationDark 2s infinite;
        }

        @keyframes pulseModerationDark {
            0% { box-shadow: 0 0 0 0 #979aaa; }
            70% { box-shadow: 0 0 0 15px rgba(151, 154, 170, 0); }
            100% { box-shadow: 0 0 0 0 rgba(151, 154, 170, 0); }
        }

        body.dark-theme .moderation-circle:hover {
            background: #aab0c0;
            animation: none;
        }

        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            z-index: 11;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            scrollbar-width: thin;
            scrollbar-color: #ffb3c6 #ffe4e9;
            animation: contentFadeIn 0.8s ease;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }
        .content::-webkit-scrollbar-track {
            background: #ffe4e9;
            border-radius: 20px;
        }
        .content::-webkit-scrollbar-thumb {
            background: #ffb3c6;
            border-radius: 20px;
            border: 2px solid #ffe4e9;
        }

        body.dark-theme .content {
            scrollbar-color: #979aaa #2a2a2a;
        }
        body.dark-theme .content::-webkit-scrollbar-track {
            background: #2a2a2a;
        }
        body.dark-theme .content::-webkit-scrollbar-thumb {
            background: #979aaa;
            border-color: #2a2a2a;
        }

        .theme-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
            border: none;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            transition: 0.4s;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: themePulse 3s infinite;
        }

        @keyframes themePulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 141, 161, 0.5); }
            50% { box-shadow: 0 0 0 10px rgba(255, 141, 161, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 141, 161, 0); }
        }

        .theme-toggle:hover {
            transform: rotate(30deg) scale(1.15);
            background: white;
            box-shadow: 0 12px 28px rgba(255, 150, 200, 0.6);
            animation: none;
        }

        body.dark-theme .theme-toggle {
            background: #979aaa;
            border-color: #b0b5c5;
            color: #ffffff;
        }

        body.dark-theme .theme-toggle:hover {
            background: #aab0c0;
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #c1506a, #ff8da1, #c1506a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            font-size: 2.4rem;
            text-shadow: 0 2px 10px rgba(255, 120, 160, 0.3);
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 2px 10px rgba(255, 120, 160, 0.3); }
            to { text-shadow: 0 4px 20px rgba(255, 120, 160, 0.6); }
        }

        h2 {
            font-size: 1.9rem;
        }

        body.dark-theme h1, body.dark-theme h2 {
            background: none;
            -webkit-text-fill-color: #f0f0f0;
            color: #f0f0f0;
            text-shadow: none;
            animation: none;
        }

        .stats, .rules {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 20px 28px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 30px rgba(255, 150, 180, 0.15);
            color: #4a2a35;
            transition: 0.3s;
            animation: slideInUp 0.6s ease;
        }

        .stats {
            display: flex;
            gap: 32px;
            font-weight: 600;
        }

        .rules {
            border-left: 6px solid #ff8da1;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats:hover, .rules:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(255, 130, 160, 0.25);
        }

        body.dark-theme .stats, body.dark-theme .rules {
            background: rgba(30, 30, 30, 0.8);
            border-color: rgba(151, 154, 170, 0.3);
            color: #e0e0e0;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }
        body.dark-theme .rules {
            border-left-color: #979aaa;
        }

        .form-group {
            margin-bottom: 24px;
            animation: formAppear 0.5s ease backwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }

        @keyframes formAppear {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #a0475e;
            letter-spacing: 0.3px;
            transition: color 0.3s;
        }

        input, textarea, select {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: 0.3s;
            color: #3a2a30;
            font-weight: 500;
        }

        textarea {
            border-radius: 30px;
            min-height: 130px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            background: white;
            border-color: #ff8da1;
            box-shadow: 0 0 0 4px rgba(255, 141, 161, 0.3);
            transform: scale(1.01);
        }

        body.dark-theme label {
            color: #ccc;
        }

        body.dark-theme input, body.dark-theme textarea, body.dark-theme select {
            background: #979aaa;
            border-color: #b0b5c5;
            color: #ffffff;
        }

        body.dark-theme input:focus, body.dark-theme textarea:focus, body.dark-theme select:focus {
            background: #aab0c0;
            border-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(151, 154, 170, 0.3);
        }

        button[type="submit"], .search-btn, .approve-btn, .delete-btn, .edit-btn, .save-btn, .cancel-btn, .logout-btn, .load-more, .like-btn, .share-btn {
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 8px;
            margin-top: 8px;
            background: linear-gradient(145deg, #ffb3c6, #ff8da1);
            color: white;
            box-shadow: 0 8px 18px rgba(255, 100, 150, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            animation: buttonPop 0.4s ease;
        }

        @keyframes buttonPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        button[type="submit"]::after, .search-btn::after, .approve-btn::after, .delete-btn::after, .edit-btn::after, .save-btn::after, .cancel-btn::after, .logout-btn::after, .load-more::after, .like-btn::after, .share-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        button[type="submit"]:hover::after, .search-btn:hover::after, .approve-btn:hover::after, .delete-btn:hover::after, .edit-btn:hover::after, .save-btn:hover::after, .cancel-btn:hover::after, .logout-btn:hover::after, .load-more:hover::after, .like-btn:hover::after, .share-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(255, 80, 140, 0.5);
            background: linear-gradient(145deg, #ffc0d0, #ff7088);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
            background: #cccccc;
        }

        body.dark-theme button:not(.theme-toggle):not(.moderation-circle) {
            background: #979aaa;
            color: #ffffff;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.5);
            border-color: #b0b5c5;
        }
        body.dark-theme button:hover:not(.theme-toggle):not(.moderation-circle) {
            background: #aab0c0;
        }

        .delete-btn { background: #e5738c; }
        .edit-btn { background: #a5b8e0; }
        .save-btn { background: #c8a2c8; }
        .cancel-btn { background: #cfa5b4; }
        .load-more { background: #d8a7b0; }

        body.dark-theme .delete-btn { background: #b38f8f; }
        body.dark-theme .edit-btn { background: #8f9fb0; }
        body.dark-theme .save-btn { background: #9f8fb0; }
        body.dark-theme .cancel-btn { background: #b08f9f; }
        body.dark-theme .load-more { background: #8f9fb0; }

        .message {
            margin-top: 20px;
            padding: 16px 24px;
            border-radius: 60px;
            display: none;
            font-weight: 600;
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid white;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: rgba(212, 237, 218, 0.8);
            color: #0e4e1f;
        }
        .message.error {
            background: rgba(248, 215, 218, 0.8);
            color: #711c24;
        }
        body.dark-theme .message.success {
            background: #2a3a2a;
            color: #a0d0a0;
        }
        body.dark-theme .message.error {
            background: #3a2a2a;
            color: #ffa0a0;
        }

        .result-item {
            border-radius: 40px;
            padding: 28px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(255, 130, 160, 0.2);
            transition: 0.4s;
            border-left: 8px solid #ff8da1;
            animation: fadeInUp 0.5s ease;
            animation-fill-mode: both;
        }

        .result-item:nth-child(1) { animation-delay: 0.1s; }
        .result-item:nth-child(2) { animation-delay: 0.2s; }
        .result-item:nth-child(3) { animation-delay: 0.3s; }
        .result-item:nth-child(4) { animation-delay: 0.4s; }
        .result-item:nth-child(5) { animation-delay: 0.5s; }
        .result-item:nth-child(6) { animation-delay: 0.6s; }
        .result-item:nth-child(7) { animation-delay: 0.7s; }
        .result-item:nth-child(8) { animation-delay: 0.8s; }
        .result-item:nth-child(9) { animation-delay: 0.9s; }
        .result-item:nth-child(10) { animation-delay: 1s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item:hover {
            transform: translateY(-5px) scale(1.01);
            background: rgba(255, 240, 245, 0.7);
            border-color: white;
            box-shadow: 0 25px 45px rgba(255, 80, 130, 0.25);
        }

        body.dark-theme .result-item {
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(151, 154, 170, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            border-left-color: #979aaa;
        }

        body.dark-theme .result-item:hover {
            background: rgba(60, 60, 60, 0.8);
            border-color: #aab0c0;
        }

        .result-item p {
            margin: 8px 0;
            font-size: 16px;
            color: #3a2a30;
            font-weight: 500;
        }

        body.dark-theme .result-item p {
            color: #e0e0e0;
        }

        .result-item strong {
            color: #b3435e;
        }

        body.dark-theme .result-item strong {
            color: #ffffff;
        }

        .no-results, .search-hint {
            text-align: center;
            font-style: italic;
            padding: 40px;
            background: rgba(255, 240, 245, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            color: #a76e7c;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body.dark-theme .no-results, body.dark-theme .search-hint {
            background: rgba(40, 40, 40, 0.8);
            color: #ccc;
        }

        .search-container {
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            animation: slideInRight 0.5s ease;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .search-container input {
            flex: 1;
            min-width: 250px;
        }

        .sort-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            animation: zoomIn 0.5s ease;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .sort-container label {
            margin-bottom: 0;
            color: #a0475e;
        }
        .sort-container select {
            width: auto;
            min-width: 220px;
        }
        body.dark-theme .sort-container {
            background: rgba(40, 40, 40, 0.5);
        }
        body.dark-theme .sort-container label {
            color: #ccc;
        }

        .moderation-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            animation: tabsFade 0.5s ease;
        }

        @keyframes tabsFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .moderation-tabs button {
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid white;
            color: #b3435e;
            transition: 0.3s;
        }

        .moderation-tabs button.active-tab {
            background: linear-gradient(145deg, #ff8da1, #ffb3c6);
            color: white;
            border-color: white;
        }

        .moderation-tabs button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 141, 161, 0.3);
        }

        body.dark-theme .moderation-tabs button {
            background: #979aaa;
            color: #ffffff;
            border-color: #b0b5c5;
        }
        body.dark-theme .moderation-tabs button.active-tab {
            background: #7e8494;
            color: white;

<body>
    <div class="theme-toggle" id="themeToggle">🌙</div>
    <div class="container">
        <div class="sidebar">
            <button id="btnHome" class="active">🏠 Главная</button>
            <button id="btnSend">📝 Отправить</button>
            <button id="btnSearch">🔍 Поиск</button>
            <div class="moderation-circle" id="btnModeration" title="Панель модератора">👮</div>
        </div>
        <div class="content" id="content"></div>
    </div>

    <!-- Изображения для пасхалки -->
    <img src="19.jpg" id="egg1" class="easter-egg-img" alt="Easter egg 1">
    <img src="20.jpg" id="egg2" class="easter-egg-img" alt="Easter egg 2">

    <!-- Аудио для пасхалки -->
    <audio id="easterAudio" src="machomen.mp3" preload="auto"></audio>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // Конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBw8OCvgXEqj0ZVPuFMMg3DTR5BfpYnNKk",
            authDomain: "marta-ebc25.firebaseapp.com",
            projectId: "marta-ebc25",
            storageBucket: "marta-ebc25.firebasestorage.app",
            messagingSenderId: "659204675048",
            appId: "1:659204675048:web:b9e6b6f414439e5aa3005d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        db.enablePersistence().catch(err => console.log("Ошибка persistence:", err));

        (function() {
            const contentDiv = document.getElementById('content');
            const btnHome = document.getElementById('btnHome');
            const btnSend = document.getElementById('btnSend');
            const btnSearch = document.getElementById('btnSearch');
            const btnModeration = document.getElementById('btnModeration');
            const themeToggle = document.getElementById('themeToggle');

            // Точные email модераторов из Authentication
            const MODERATOR_EMAILS = [
                'yurapon11972020@gmail.com',
                'yraslavskibididobi@mail.ru',
                'iluhamoder@mail.ru',
                'danilsupervpn@mail.ru',
                'skvizzymedium@mail.ru',
                'dlaprepodov@mail.ru'
            ].map(email => email.toLowerCase());

            const POST_COOLDOWN = 5 * 60 * 1000;

            // Пасхалка
            let clickCount = 0;
            let firstClickTime = 0;
            let easterEggActive = false;
            let currentEggIndex = 1;

            const audio = document.getElementById('easterAudio');
            const egg1 = document.getElementById('egg1');
            const egg2 = document.getElementById('egg2');

            function showEasterEgg() {
                if (easterEggActive) return;
                easterEggActive = true;
                const currentEgg = currentEggIndex === 1 ? egg1 : egg2;
                const nextIndex = currentEggIndex === 1 ? 2 : 1;
                currentEgg.classList.remove('hide', 'show');
                currentEgg.style.display = 'block';
                void currentEgg.offsetWidth;
                currentEgg.classList.add('show');
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Ошибка воспроизведения аудио:", e));
                setTimeout(() => {
                    currentEgg.classList.remove('show');
                    currentEgg.classList.add('hide');
                }, 4500);
                setTimeout(() => {
                    currentEgg.style.display = 'none';
                    currentEgg.classList.remove('hide');
                    easterEggActive = false;
                    currentEggIndex = nextIndex;
                }, 6000);
            }

            themeToggle.addEventListener('click', (e) => {
                let darkTheme = localStorage.getItem('theme') === 'dark';
                darkTheme = !darkTheme;
                document.body.classList.toggle('dark-theme', darkTheme);
                localStorage.setItem('theme', darkTheme ? 'dark' : 'light');
                themeToggle.textContent = darkTheme ? '☀️' : '🌙';

                const now = Date.now();
                if (firstClickTime === 0 || now - firstClickTime > 2000) {
                    clickCount = 1;
                    firstClickTime = now;
                } else {
                    clickCount++;
                    if (clickCount >= 5 && !easterEggActive) {
                        showEasterEgg();
                        clickCount = 0;
                        firstClickTime = 0;
                    }
                }
                themeToggle.style.transform = 'rotate(360deg)';
                setTimeout(() => themeToggle.style.transform = '', 300);
            });

            let darkTheme = localStorage.getItem('theme') === 'dark';
            if (darkTheme) {
                document.body.classList.add('dark-theme');
                themeToggle.textContent = '☀️';
            } else {
                themeToggle.textContent = '🌙';
            }

            function showHeartAnimation() {
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart-animation';
                        heart.innerHTML = '❤️';
                        heart.style.left = Math.random() * 100 + '%';
                        heart.style.top = Math.random() * 100 + '%';
                        document.body.appendChild(heart);
                        setTimeout(() => heart.remove(), 2000);
                    }, i * 100);
                }
            }

            function isAdmin() {
                const user = auth.currentUser;
                return user && MODERATOR_EMAILS.includes(user.email.toLowerCase());
            }

            function getLastPostTime() {
                const time = localStorage.getItem('lastPostTime');
                return time ? parseInt(time, 10) : 0;
            }

            function setLastPostTime() {
                localStorage.setItem('lastPostTime', Date.now().toString());
            }

            function canPost() {
                if (isAdmin()) return true;
                const last = getLastPostTime();
                return (Date.now() - last) >= POST_COOLDOWN;
            }

            function getRemainingSeconds() {
                if (isAdmin()) return 0;
                const last = getLastPostTime();
                const diff = POST_COOLDOWN - (Date.now() - last);
                return diff > 0 ? Math.ceil(diff / 1000) : 0;
            }

            async function logModeratorAction(action, details, docId = null) {
                if (!isAdmin()) return;
                try {
                    await db.collection('logs').add({
                        moderator: auth.currentUser.email,
                        action: action,
                        details: details,
                        documentId: docId,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) {
                    console.error("Ошибка логирования:", e);
                }
            }

            // ========== УНИКАЛЬНЫЙ ИДЕНТИФИКАТОР ПОЛЬЗОВАТЕЛЯ ДЛЯ ЛАЙКОВ ==========
            function getUserId() {
                const user = auth.currentUser;
                if (user) return 'user_' + user.uid;

                let sessionId = localStorage.getItem('session_id');
                if (!sessionId) {
                    sessionId = 'session_' + Math.random().toString(36).substring(2) + Date.now();
                    localStorage.setItem('session_id', sessionId);
                }
                return sessionId;
            }

            // ========== ЛАЙКИ: ОДИН ЛАЙК НА ПОЛЬЗОВАТЕЛЯ ДЛЯ ВСЕХ (ВКЛЮЧАЯ МОДЕРАТОРОВ) ==========
            async function likeCongratulation(postId) {
                const userId = getUserId();
                const likeId = `${postId}_${userId}`;

                try {
                    await db.runTransaction(async (transaction) => {
                        const likeRef = db.collection('likes').doc(likeId);
                        const likeDoc = await transaction.get(likeRef);
                        if (likeDoc.exists) {
                            throw new Error('already liked');
                        }

                        transaction.set(likeRef, {
                            postId: postId,
                            userId: userId,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });

                        const postRef = db.collection('congratulations').doc(postId);
                        transaction.update(postRef, {
                            likes: firebase.firestore.FieldValue.increment(1)
                        });
                    });
                    return true; // лайк поставлен
                } catch (error) {
                    if (error.message === 'already liked') {
                        console.log('Пользователь уже лайкал это поздравление');
                        return false;
                    }
                    console.error("Ошибка при лайке: ", error);
                    throw error;
                }
            }

            // ========== ЗАГРУЗКА ЛАЙКОВ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ ДЛЯ СПИСКА ПОСТОВ ==========
            async function getUserLikesForPosts(postIds) {
                if (!postIds || postIds.length === 0) return {};
                const userId = getUserId();
                const chunks = [];
                for (let i = 0; i < postIds.length; i += 10) {
                    chunks.push(postIds.slice(i, i + 10));
                }
                let likesMap = {};
                for (const chunk of chunks) {
                    const snapshot = await db.collection('likes')
                        .where('userId', '==', userId)
                        .where('postId', 'in', chunk)
                        .get();
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        likesMap[data.postId] = true;
                    });
                }
                return likesMap;
            }

            // ========== СТАТИСТИКА С КЭШЕМ ==========
            const STATS_CACHE_KEY = 'stats_cache';
            const STATS_CACHE_TTL = 5 * 60 * 1000;

            async function getStats() {
                const cached = localStorage.getItem(STATS_CACHE_KEY);
                if (cached) {
                    const { stats, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < STATS_CACHE_TTL) {
                        return stats;
                    }
                }

                const [totalSnap, approvedSnap] = await Promise.all([
                    db.collection('congratulations').get(),
                    db.collection('congratulations').where('approved', '==', true).get()
                ]);
                const stats = { total: totalSnap.size, approved: approvedSnap.size };

                localStorage.setItem(STATS_CACHE_KEY, JSON.stringify({ stats, timestamp: Date.now() }));
                return stats;
            }

            function invalidateStatsCache() {
                localStorage.removeItem(STATS_CACHE_KEY);
            }

            // ========== ДОБАВЛЕНИЕ ПОЗДРАВЛЕНИЯ (с полем pinned = false) ==========
            async function addCongratulation(from, to, category, message) {
                try {
                    const docRef = await db.collection('congratulations').add({
                        from, to, category, message,
                        date: firebase.firestore.FieldValue.serverTimestamp(),
                        approved: false,
                        likes: 0,
                        pinned: false
                    });
                    invalidateStatsCache();
                    return { success: true, id: docRef.id };
                } catch (error) {
                    console.error("Ошибка добавления: ", error);
                    return { success: false };
                }
            }

            // ========== ЗАГРУЗКА ПОСЛЕДНИХ ОДОБРЕННЫХ (с сортировкой по pinned и date) ==========
            async function loadRecentApproved(lastDoc = null, limit = 3) {
                try {
                    let query = db.collection('congratulations')
                        .where('approved', '==', true)
                        .orderBy('pinned', 'desc')
                        .orderBy('date', 'desc')
                        .limit(limit);
                    if (lastDoc) query = query.startAfter(lastDoc);
                    const snapshot = await query.get();
                    const last = snapshot.docs[snapshot.docs.length - 1];
                    const results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    return { results, last };
                } catch (error) {
                    console.error("Ошибка загрузки последних: ", error);
                    return { results: [], last: null };
                }
            }

            async function loadAllApproved(forceRefresh = false) {
                try {
                    let query = db.collection('congratulations').where('approved', '==', true);
                    let snapshot;
                    if (forceRefresh) {
                        snapshot = await query.get({ source: 'server' });
                    } else {
                        snapshot = await query.get();
                    }
                    localStorage.setItem('lastUpdate', Date.now().toString());
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error("Ошибка загрузки всех записей: ", error);
                    return [];
                }
            }

            async function getUnapprovedCongrats() {
                try {
                    const snapshot = await db.collection('congratulations').where('approved', '==', false).get();
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error("Ошибка получения неодобренных: ", error);
                    return [];
                }
            }

            async function getAllCongrats() {
                try {
                    const snapshot = await db.collection('congratulations').orderBy('date', 'desc').limit(50).get();
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error("Ошибка получения всех записей: ", error);
                    return [];
                }
            }

            async function updateCongratulation(id, data) {
                await db.collection('congratulations').doc(id).update(data);
            }

            async function deleteCongratulation(id) {
                await db.collection('congratulations').doc(id).delete();
            }

            function sortCongrats(items, sortBy) {
                const sorted = [...items];
                switch (sortBy) {
                    case 'date_desc':
                        sorted.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
                        break;
                    case 'date_asc':
                        sorted.sort((a, b) => (a.date?.seconds || 0) - (b.date?.seconds || 0));
                        break;
                    case 'likes_desc':
                        sorted.sort((a, b) => (b.likes || 0) - (a.likes || 0));
                        break;
                    case 'likes_asc':
                        sorted.sort((a, b) => (a.likes || 0) - (b.likes || 0));
                        break;
                    case 'from_asc':
                        sorted.sort((a, b) => (a.from || '').localeCompare(b.from || ''));
                        break;
                    case 'from_desc':
                        sorted.sort((a, b) => (b.from || '').localeCompare(a.from || ''));
                        break;
                    case 'to_asc':
                        sorted.sort((a, b) => (a.to || '').localeCompare(b.to || ''));
                        break;
                    case 'to_desc':
                        sorted.sort((a, b) => (b.to || '').localeCompare(a.to || ''));
                        break;
                    default:
                        sorted.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
                }
                return sorted;
            }

            function setActiveButton(activeId) {
                [btnHome, btnSend, btnSearch].forEach(btn => btn.classList.remove('active'));
                if (activeId !== 'btnModeration') {
                    document.getElementById(activeId).classList.add('active');
                }
                btnModeration.classList.remove('active');
            }

            // ==================== ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ ОТРИСОВКИ КАРТОЧЕК С ЛАЙКАМИ ====================
            async function renderCards(container, items, userLikesMap = {}) {
                container.innerHTML = '';
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    const d = item.date ? new Date(item.date.seconds * 1000).toLocaleString() : '';
                    const liked = !!userLikesMap[item.id];
                    const cardHtml = `
                        <div class="result-item" style="animation-delay: ${i * 0.1}s">
                            <p><strong>От кого:</strong> ${item.from}</p>
                            <p><strong>Кому:</strong> ${item.to} (${item.category === 'teacher' ? '👩‍🏫' : '👥'})</p>
                            <p><strong>Текст:</strong> ${item.message}</p>
                            <small>${d} | ❤️ ${item.likes || 0}</small>
                            <br>
                            <button class="like-btn" data-id="${item.id}" ${liked ? 'disabled' : ''}>${liked ? '❤️ Вы лайкнули' : '❤️ Нравится'}</button>
                            <button class="share-btn" data-id="${item.id}" data-to="${item.to}">🔗 Поделиться</button>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                }

                container.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.id;
                        btn.disabled = true;
                        const originalText = btn.textContent;
                        btn.textContent = '⏳ Обработка...';
                        try {
                            const success = await likeCongratulation(id);
                            if (success) {
                                btn.textContent = '❤️ Вы лайкнули';
                                const likeSpan = btn.closest('.result-item').querySelector('small');
                                if (likeSpan) {
                                    const currentLikes = parseInt(likeSpan.textContent.match(/❤️ (\d+)/)?.[1] || '0');
                                    likeSpan.innerHTML = likeSpan.innerHTML.replace(/❤️ \d+/, `❤️ ${currentLikes + 1}`);
                                }
                            } else {
                                btn.textContent = '❤️ Вы уже лайкнули';
                            }
                        } catch (error) {
                            console.error('Ошибка лайка:', error);
                            btn.disabled = false;
                            btn.textContent = originalText;
                            alert('Не удалось поставить лайк. Попробуйте позже.');
                        }
                    });
                });

                container.querySelectorAll('.share-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.id;
                        const to = e.target.dataset.to;
                        const url = window.location.href.split('#')[0] + '#congratulation=' + id;
                        const text = `Напиши ${to} чтобы увидеть поздравления ${url}`;
                        navigator.clipboard.writeText(text);
                        alert('Ссылка с именем скопирована!');
                    });
                });
            }

            // ==================== ГЛАВНАЯ ====================
            async function renderHome() {
                setActiveButton('btnHome');

                contentDiv.innerHTML = `
                    <h1>🌸 Поздравления с 8 марта</h1>
                    <div class="stats">
                        <span>📨 Всего отправлено: <span id="totalStat">...</span></span>
                        <span>✅ Одобрено: <span id="approvedStat">...</span></span>
                    </div>
                    <div class="rules">
                        <strong>Правила:</strong>
                        <ul style="margin-top:10px; margin-left:20px;">
                            <li>Заполните все поля, чтобы отправить поздравление.</li>
                            <li>Укажите, от кого и кому (имя и фамилию).</li>
                            <li>Все поздравления проходят модерацию перед публикацией.</li>
                            <li>Одно поздравление можно отправлять не чаще, чем раз в 5 минут.</li>
                        </ul>
                    </div>
                    <h2>📬 Последние поздравления</h2>
                    <div id="recentResults" class="search-hint">Загрузка...</div>
                    <button id="loadMoreRecentBtn" class="load-more" style="display:none;">Загрузить ещё 3</button>
                `;

                const [stats, recentData] = await Promise.all([
                    getStats(),
                    loadRecentApproved(null, 3)
                ]);

                document.getElementById('totalStat').textContent = stats.total;
                document.getElementById('approvedStat').textContent = stats.approved;

                const recentDiv = document.getElementById('recentResults');
                const loadMoreBtn = document.getElementById('loadMoreRecentBtn');
                let lastDoc = recentData.last;
                let allLoaded = recentData.results.length < 3;
                let currentItems = recentData.results;

                const postIds = currentItems.map(item => item.id);
                const userLikes = await getUserLikesForPosts(postIds);
                await renderCards(recentDiv, currentItems, userLikes);

                loadMoreBtn.style.display = allLoaded ? 'none' : 'block';

                loadMoreBtn.addEventListener('click', async () => {
                    if (allLoaded) return;
                    const data = await loadRecentApproved(lastDoc, 3);
                    if (data.results.length > 0) {
                        currentItems = [...currentItems, ...data.results];
                        const allPostIds = currentItems.map(item => item.id);
                        const allLikes = await getUserLikesForPosts(allPostIds);
                        await renderCards(recentDiv, currentItems, allLikes);
                        lastDoc = data.last;
                        allLoaded = data.results.length < 3;
                        loadMoreBtn.style.display = allLoaded ? 'none' : 'block';
                    } else {
                        allLoaded = true;
                        loadMoreBtn.style.display = 'none';
                    }
                });
            }

            // ==================== ОТПРАВКА ====================
            function renderSend() {
                setActiveButton('btnSend');
                contentDiv.innerHTML = `
                    <h2>✍️ Отправить поздравление</h2>
                    <form id="greetingForm">
                        <div class="form-group">
                            <label for="from">От кого (ваше имя и фамилия):</label>
                            <input type="text" id="from" required placeholder="Иван Иванов">
                        </div>
                        <div class="form-group">
                            <label for="to">Кому (имя и фамилия получателя):</label>
                            <input type="text" id="to" required placeholder="Мария Петрова">
                        </div>
                        <div class="form-group">
                            <label for="category">Категория получателя:</label>
                            <select id="category" required>
                                <option value="teacher">👩‍🏫 Преподаватель</option>
                                <option value="classmate">👥 Одногруппник</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Текст поздравления:</label>
                            <textarea id="message" required placeholder="С 8 марта! Желаю счастья..."></textarea>
                        </div>
                        <button type="submit" id="submitBtn">Отправить на модерацию 💐</button>
                        <div id="formMessage" class="message"></div>
                        <div id="timerMessage" class="timer-message"></div>
                    </form>
                `;

                const form = document.getElementById('greetingForm');
                const submitBtn = document.getElementById('submitBtn');
                const msg = document.getElementById('formMessage');
                const timerMsg = document.getElementById('timerMessage');

                function updateButtonState() {
                    if (canPost()) {
                        submitBtn.disabled = false;
                        timerMsg.textContent = '';
                    } else {
                        submitBtn.disabled = true;
                        const sec = getRemainingSeconds();
                        timerMsg.textContent = `⏳ Отправлять можно будет через ${sec} сек.`;
                    }
                }

                const timerInterval = setInterval(updateButtonState, 1000);
                updateButtonState();

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const from = document.getElementById('from').value.trim();
                    const to = document.getElementById('to').value.trim();
                    const category = document.getElementById('category').value;
                    const message = document.getElementById('message').value.trim();

                    if (!from || !to || !message) {
                        msg.className = 'message error';
                        msg.textContent = 'Все поля должны быть заполнены!';
                        msg.style.display = 'block';
                        return;
                    }

                    if (!canPost()) {
                        msg.className = 'message error';
                        msg.textContent = 'Подождите 5 минут перед следующей отправкой.';
                        msg.style.display = 'block';
                        return;
                    }

                    const result = await addCongratulation(from, to, category, message);
                    if (result.success) {
                        form.reset();
                        setLastPostTime();
                        updateButtonState();
                        msg.className = 'message success';
                        msg.textContent = 'Поздравление отправлено на модерацию! 💖';
                        msg.style.display = 'block';
                        showHeartAnimation();
                        setTimeout(() => msg.style.display = 'none', 3000);
                    } else {
                        msg.className = 'message error';
                        msg.textContent = 'Ошибка отправки. Попробуйте позже.';
                        msg.style.display = 'block';
                    }
                });
            }

            // ==================== ПОИСК ====================
            async function renderSearch() {
                setActiveButton('btnSearch');
                contentDiv.innerHTML = `
                    <h1>🔎 Все поздравления</h1>
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                        <div>
                            <span id="lastUpdateLabel"></span>
                            <button id="refreshDataBtn" class="load-more" style="width: auto; padding: 8px 15px; margin: 0;">🔄 Обновить</button>
                        </div>
                    </div>
                    <div class="search-container">
                        <input type="text" id="searchInput" placeholder="Введите имя получателя для поиска (оставьте пустым, чтобы показать все)">
                        <button class="search-btn" id="searchBtn">Найти</button>
                    </div>
                    <div class="sort-container">
                        <label for="searchSort">Сортировать:</label>
                        <select id="searchSort">
                            <option value="date_desc">Сначала новые</option>
                            <option value="date_asc">Сначала старые</option>
                            <option value="likes_desc">По лайкам (сначала больше)</option>
                            <option value="likes_asc">По лайкам (сначала меньше)</option>
                            <option value="from_asc">По отправителю (А-Я)</option>
                            <option value="from_desc">По отправителю (Я-А)</option>
                            <option value="to_asc">По получателю (А-Я)</option>
                            <option value="to_desc">По получателю (Я-А)</option>
                        </select>
                    </div>
                    <div id="searchResults" class="search-hint">Загрузка...</div>
                    <button id="loadMoreBtn" class="load-more" style="display:none;">Загрузить ещё 10</button>
                `;

                const input = document.getElementById('searchInput');
                const btn = document.getElementById('searchBtn');
                const results = document.getElementById('searchResults');
                const loadMore = document.getElementById('loadMoreBtn');
                const sortSelect = document.getElementById('searchSort');
                const refreshBtn = document.getElementById('refreshDataBtn');
                const lastUpdateLabel = document.getElementById('lastUpdateLabel');

                let allItems = [];
                let displayedCount = 0;
                let currentQuery = '';
                let currentSort = sortSelect.value;

                function updateLastUpdateLabel() {
                    const lastUpdate = localStorage.getItem('lastUpdate');
                    if (lastUpdate) {
                        const date = new Date(parseInt(lastUpdate));
                        lastUpdateLabel.textContent = `📅 Последнее обновление: ${date.toLocaleString()}`;
                    } else {
                        lastUpdateLabel.textContent = '';
                    }
                }
                updateLastUpdateLabel();

                async function displayItems() {
                    let filtered = allItems;
                    if (currentQuery.trim() !== '') {
                        const lower = currentQuery.toLowerCase();
                        filtered = allItems.filter(item => item.to.toLowerCase().includes(lower));
                    }
                    const sorted = sortCongrats(filtered, currentSort);
                    const totalFiltered = sorted.length;

                    if (totalFiltered === 0) {
                        results.innerHTML = `<div class="no-results">😔 По запросу «${currentQuery || 'все'}» ничего не найдено.</div>`;
                        loadMore.style.display = 'none';
                        return;
                    }

                    const toShow = sorted.slice(0, displayedCount);
                    const postIds = toShow.map(item => item.id);
                    const userLikes = await getUserLikesForPosts(postIds);
                    await renderCards(results, toShow, userLikes);

                    if (displayedCount >= totalFiltered) {
                        loadMore.style.display = 'none';
                    } else {
                        loadMore.style.display = 'block';
                    }
                }

                async function loadAllData(forceRefresh = false) {
                    results.innerHTML = '<div class="search-hint">Загрузка...</div>';
                    allItems = await loadAllApproved(forceRefresh);
                    displayedCount = 10;
                    await displayItems();
                    updateLastUpdateLabel();
                }

                input.addEventListener('input', () => {
                    currentQuery = input.value.trim();
                    displayedCount = 10;
                    displayItems();
                });

                btn.addEventListener('click', () => {
                    currentQuery = input.value.trim();
                    displayedCount = 10;
                    displayItems();
                });

                sortSelect.addEventListener('change', () => {
                    currentSort = sortSelect.value;
                    displayedCount = 10;
                    displayItems();
                });

                loadMore.addEventListener('click', () => {
                    displayedCount += 10;
                    displayItems();
                });

                refreshBtn.addEventListener('click', () => {
                    loadAllData(true);
                });

                await loadAllData(false);
            }

            // ==================== МОДЕРАЦИЯ (с кнопкой закрепления) ====================
            async function renderModeration() {
                if (!isAdmin()) {
                    // Отображаем информацию о модераторах и форму входа
                    contentDiv.innerHTML = `
                        <div class="moderator-info" style="background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); border-radius: 60px; padding: 20px 28px; margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.6); color: #4a2a35;">
                            <p><strong>🌷 Вот наши модераторы:</strong></p>
                            <p>Усатов Тимофей, Илья Говтва, Ярослав Носков, Вадим Муллаголиев, Данила Сарычев.</p>
                            <p><em>Все мы будем одобрять ваши анкеты в период работы сайта.</em></p>
                        </div>
                        <div class="admin-login">
                            <h2>🔐 Вход для модератора</h2>
                            <input type="email" id="adminEmail" placeholder="Email" value="">
                            <input type="password" id="adminPass" placeholder="Пароль">
                            <button id="loginAdminBtn">Войти</button>
                            <div id="loginMessage"></div>
                        </div>
                    `;

                    document.getElementById('loginAdminBtn').addEventListener('click', () => {
                        const email = document.getElementById('adminEmail').value;
                        const pass = document.getElementById('adminPass').value;
                        auth.signInWithEmailAndPassword(email, pass)
                            .then(() => {
                                renderModeration();
                            })
                            .catch(error => {
                                document.getElementById('loginMessage').textContent = 'Ошибка входа: ' + error.message;
                            });
                    });
                    return;
                }

                // Код для авторизованных модераторов
                let html = `
                    <div class="moderation-header">
                        <h2>🛡️ Панель модератора</h2>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                    <div class="moderation-tabs">
                        <button id="tabNew" class="active-tab">📬 Новые</button>
                        <button id="tabAll">📋 Все записи</button>
                    </div>
                    <div id="moderationContent"></div>
                `;
                contentDiv.innerHTML = html;

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    auth.signOut().then(() => {
                        renderModeration();
                    });
                });

                const modContent = document.getElementById('moderationContent');
                const tabNew = document.getElementById('tabNew');
                const tabAll = document.getElementById('tabAll');

                function setActiveTab(tab) {
                    [tabNew, tabAll].forEach(b => b.classList.remove('active-tab'));
                    if (tab === 'new') {
                        tabNew.classList.add('active-tab');
                        loadNew();
                    } else {
                        tabAll.classList.add('active-tab');
                        loadAll();
                    }
                }

                async function loadNew() {
                    try {
                        const items = await getUnapprovedCongrats();
                        if (items.length === 0) {
                            modContent.innerHTML = '<p class="no-results">✨ Нет новых записей</p>';
                        } else {
                            renderItems(items, 'new');
                        }
                    } catch (error) {
                        modContent.innerHTML = `<p class="message error">❌ Ошибка загрузки: ${error.message}</p>`;
                    }
                }

                async function loadAll() {
                    try {
                        const items = await getAllCongrats();
                        if (items.length === 0) {
                            modContent.innerHTML = '<p class="no-results">✨ Нет записей</p>';
                        } else {
                            renderItems(items, 'all');
                        }
                    } catch (error) {
                        modContent.innerHTML = `<p class="message error">❌ Ошибка загрузки: ${error.message}</p>`;
                    }
                }

                function renderItems(items, type) {
                    let out = '';
                    items.forEach((item, index) => {
                        const dateStr = item.date ? new Date(item.date.seconds * 1000).toLocaleString() : '';
                        const approvedStatus = item.approved ? '✅ Одобрено' : '⏳ На модерации';
                        const pinnedStatus = item.pinned ? '📌 Закреплено' : '📍 Не закреплено';

                        out += `
                            <div class="result-item" data-id="${item.id}" style="animation-delay: ${index * 0.1}s">
                                <div class="item-view">
                                    <p><strong>От:</strong> <span class="from-text">${item.from}</span></p>
                                    <p><strong>Кому:</strong> <span class="to-text">${item.to} (${item.category === 'teacher' ? '👩‍🏫' : '👥'})</span></p>
                                    <p><strong>Текст:</strong> <span class="msg-text">${item.message}</span></p>
                                    <p><small>${dateStr} | ${approvedStatus} | ❤️ ${item.likes || 0} | ${pinnedStatus}</small></p>
                                    <button class="edit-btn" data-id="${item.id}">✏️ Редактировать</button>
                                    <button class="delete-btn" data-id="${item.id}">🗑️ Удалить</button>
                                    ${!item.approved ? `<button class="approve-btn" data-id="${item.id}">✅ Одобрить</button>` : ''}
                                    <button class="pin-btn" data-id="${item.id}" data-pinned="${item.pinned}">${item.pinned ? '📌 Открепить' : '📌 Закрепить'}</button>
                                </div>
                                <div class="item-edit" style="display:none;">
                                    <input class="inline-edit-input edit-from" value="${item.from.replace(/"/g, '&quot;')}">
                                    <input class="inline-edit-input edit-to" value="${item.to.replace(/"/g, '&quot;')}">
                                    <input class="inline-edit-input edit-category" value="${item.category || 'teacher'}">
                                    <textarea class="inline-edit-input edit-msg">${item.message.replace(/"/g, '&quot;')}</textarea>
                                    <button class="save-btn" data-id="${item.id}">💾 Сохранить</button>
                                    <button class="cancel-btn">❌ Отмена</button>
                                </div>
                            </div>
                        `;
                    });

                    modContent.innerHTML = out;

                    document.querySelectorAll('.edit-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const card = e.target.closest('.result-item');
                            card.querySelector('.item-view').style.display = 'none';
                            card.querySelector('.item-edit').style.display = 'block';
                        });
                    });

                    document.querySelectorAll('.cancel-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const card = e.target.closest('.result-item');
                            card.querySelector('.item-view').style.display = 'block';
                            card.querySelector('.item-edit').style.display = 'none';
                        });
                    });

                    document.querySelectorAll('.save-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const card = e.target.closest('.result-item');
                            const id = card.dataset.id;
                            const from = card.querySelector('.edit-from').value.trim();
                            const to = card.querySelector('.edit-to').value.trim();
                            const category = card.querySelector('.edit-category').value.trim();
                            const msg = card.querySelector('.edit-msg').value.trim();

                            if (!from || !to || !msg) {
                                alert('Заполните все поля!');
                                return;
                            }

                            try {
                                await updateCongratulation(id, { from, to, category, message: msg });
                                await logModeratorAction('edit', `Изменил запись ${id}`, id);
                                invalidateStatsCache();
                                if (type === 'new') loadNew(); else loadAll();
                            } catch (error) {
                                alert('Ошибка сохранения: ' + error.message);
                            }
                        });
                    });

                    document.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.target.dataset.id;
                            if (confirm('Вы уверены, что хотите удалить это поздравление?')) {
                                try {
                                    await deleteCongratulation(id);
                                    await logModeratorAction('delete', `Удалил запись ${id}`, id);
                                    invalidateStatsCache();
                                    if (type === 'new') loadNew(); else loadAll();
                                } catch (error) {
                                    alert('Ошибка удаления: ' + error.message);
                                }
                            }
                        });
                    });

                    document.querySelectorAll('.approve-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.target.dataset.id;
                            try {
                                await updateCongratulation(id, { approved: true });
                                await logModeratorAction('approve', `Одобрил запись ${id}`, id);
                                invalidateStatsCache();
                                if (type === 'new') loadNew(); else loadAll();
                            } catch (error) {
                                alert('Ошибка одобрения: ' + error.message);
                            }
                        });
                    });

                    document.querySelectorAll('.pin-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = e.target.dataset.id;
                            const currentPinned = e.target.dataset.pinned === 'true';
                            try {
                                await updateCongratulation(id, { pinned: !currentPinned });
                                await logModeratorAction('pin', `Переключил закрепление для ${id} на ${!currentPinned}`, id);
                                if (type === 'new') loadNew(); else loadAll();
                            } catch (error) {
                                alert('Ошибка изменения закрепления: ' + error.message);
                            }
                        });
                    });
                }

                tabNew.addEventListener('click', () => setActiveTab('new'));
                tabAll.addEventListener('click', () => setActiveTab('all'));

                setActiveTab('new');
            }

            auth.onAuthStateChanged(user => {});

            btnHome.addEventListener('click', renderHome);
            btnSend.addEventListener('click', renderSend);
            btnSearch.addEventListener('click', renderSearch);
            btnModeration.addEventListener('click', renderModeration);

            renderHome();
        })();
    </script>
</body>
</html>
