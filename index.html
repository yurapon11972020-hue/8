<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поздравления с 8 марта | Колледж</title>
  <meta name="description" content="Современный сайт поздравлений с модерацией, поиском, лайками и Firebase.">
  <style>
    :root {
      --bg: #fff8fb;
      --bg-soft: #fff1f6;
      --panel: rgba(255,255,255,.82);
      --panel-strong: rgba(255,255,255,.92);
      --text: #2f2430;
      --muted: #7f6374;
      --line: rgba(195, 97, 135, 0.14);
      --accent: #d84d87;
      --accent-2: #ff8db6;
      --accent-3: #ffe1ee;
      --danger: #d6455d;
      --success: #177245;
      --shadow: 0 12px 30px rgba(216,77,135,.14);
      --radius: 24px;
      --radius-sm: 16px;
      --radius-pill: 999px;
    }

    body.dark-theme {
      --bg: #16131a;
      --bg-soft: #1f1823;
      --panel: rgba(31,24,35,.88);
      --panel-strong: rgba(35,28,40,.95);
      --text: #f7edf3;
      --muted: #c9b5c2;
      --line: rgba(255,255,255,.08);
      --accent: #f48ab7;
      --accent-2: #c5a0ff;
      --accent-3: #2a1f2f;
      --danger: #ff8398;
      --success: #6ad6a1;
      --shadow: 0 12px 30px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,170,205,.35), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,210,232,.4), transparent 34%),
        linear-gradient(180deg, var(--bg), var(--bg-soft));
      transition: background .25s ease, color .25s ease;
    }

    .page {
      width: min(1320px, calc(100% - 24px));
      margin: 12px auto;
      min-height: calc(100vh - 24px);
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 18px;
    }

    .sidebar, .content-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .sidebar {
      padding: 22px;
      position: sticky;
      top: 12px;
      height: fit-content;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 12px 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 24px;
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 10px;
    }

    .nav button,
    .icon-btn,
    .btn,
    button[type="submit"] {
      border: 0;
      border-radius: var(--radius-pill);
      cursor: pointer;
      font: inherit;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, opacity .18s ease;
    }

    .nav button {
      text-align: left;
      padding: 14px 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid transparent;
      font-weight: 600;
    }

    .nav button.active,
    .nav button:hover {
      background: linear-gradient(135deg, rgba(216,77,135,.12), rgba(255,141,182,.18));
      border-color: var(--line);
      transform: translateY(-1px);
    }

    .sidebar-footer {
      margin-top: auto;
      display: grid;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .theme-toggle,
    .mod-button {
      padding: 12px 14px;
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .content-shell {
      min-height: calc(100vh - 24px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 22px 26px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-strong);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .topbar .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: var(--radius-pill);
      background: rgba(216,77,135,.1);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    #content {
      padding: 26px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.3fr .9fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .card h2, .card h3, .section-title {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.1;
    }

    .card h3 { font-size: 20px; }
    .subtle { color: var(--muted); }

    .cta-row, .filters, .toolbar, .split-actions, .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn,
    button[type="submit"] {
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 700;
      box-shadow: var(--shadow);
    }

    .btn.secondary {
      background: var(--panel-strong);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .btn.danger {
      background: linear-gradient(135deg, var(--danger), #ff8a9e);
    }

    .btn.success {
      background: linear-gradient(135deg, var(--success), #7ddab2);
    }

    .btn:disabled,
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none;
    }

    .btn:hover,
    .icon-btn:hover,
    .nav button:hover,
    button[type="submit"]:hover {
      transform: translateY(-2px);
    }

    .stats-grid,
    .grid-2,
    .grid-3 {
      display: grid;
      gap: 16px;
    }

    .stats-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .stat {
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.56));
      border: 1px solid var(--line);
    }

    body.dark-theme .stat {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    }

    .stat .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 28px;
      font-weight: 800;
    }

    .section {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cards-list {
      display: grid;
      gap: 14px;
    }

    .post-card {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 22px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      scroll-margin-top: 96px;
    }

    .post-card.highlight {
      outline: 2px solid rgba(216,77,135,.35);
      background: linear-gradient(180deg, rgba(255,141,182,.15), transparent), var(--panel-strong);
    }

    .post-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: var(--radius-pill);
      background: rgba(216,77,135,.09);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .post-message {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .meta-line {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }

    .empty,
    .skeletons {
      padding: 24px;
      border-radius: 20px;
      border: 1px dashed var(--line);
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.35);
    }

    .skeleton {
      height: 108px;
      border-radius: 20px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, rgba(255,255,255,.5), rgba(255,255,255,.85), rgba(255,255,255,.5));
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to { background-position: -200% 0; }
    }

    form { display: grid; gap: 16px; }
    .field { display: grid; gap: 8px; }
    .field label { font-weight: 700; }

    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    textarea { min-height: 144px; resize: vertical; }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(216,77,135,.45);
      box-shadow: 0 0 0 4px rgba(216,77,135,.12);
    }

    .hint, .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .helper-box {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(216,77,135,.08);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .search-box {
      display: grid;
      gap: 14px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) repeat(3, minmax(0, .55fr));
      gap: 12px;
      align-items: end;
    }

    .toast-wrap {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: grid;
      gap: 10px;
      z-index: 9999;
    }

    .toast {
      min-width: 240px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 16px;
      color: white;
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      animation: slideUp .2s ease;
    }

    .toast.success { background: linear-gradient(135deg, #1f8f59, #55c48c); }
    .toast.error { background: linear-gradient(135deg, #c33f58, #ff8398); }
    .toast.info { background: linear-gradient(135deg, #7a57d1, #d182ff); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heart {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      font-size: 26px;
      animation: floatHeart 1.8s ease forwards;
      filter: drop-shadow(0 10px 10px rgba(216,77,135,.35));
    }

    @keyframes floatHeart {
      from { opacity: 1; transform: translateY(0) scale(.8); }
      to { opacity: 0; transform: translateY(-180px) scale(1.4) rotate(18deg); }
    }

    .easter-egg-img {
      position: fixed;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      max-width: min(80vw, 720px);
      max-height: 72vh;
      z-index: 9000;
      display: none;
      border-radius: 24px;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }

    .easter-egg-img.show { display: block; }

    .auth-box, .moderation-grid {
      display: grid;
      gap: 16px;
    }

    .moderation-item {
      display: grid;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      background: var(--panel-strong);
    }

    .moderation-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .moderation-tabs button.active-tab {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .inline-edit {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }

    .pin-link {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dashed currentColor;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .hero, .search-grid, .stats-grid, .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .topbar { padding: 18px; }
      #content { padding: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">🌸</div>
        <div>
          <h1>8 Марта</h1>
          <p>Поздравления колледжа</p>
        </div>
      </div>

      <nav class="nav">
        <button id="btnHome" class="active">🏠 Главная</button>
        <button id="btnSend">✍️ Отправить</button>
        <button id="btnSearch">🔎 Поиск</button>
      </nav>

      <div class="sidebar-footer">
        <button id="themeToggle" class="theme-toggle">🌙 Тема</button>
        <button id="btnModeration" class="mod-button">🛡️ Модерация</button>
      </div>
    </aside>

    <main class="content-shell">
      <div class="topbar">
        <div>
          <strong>Сайт поздравлений</strong>
          <div class="meta">
            <span id="topStatus">Готов к работе</span>
            <span id="clockBadge" class="badge">⏱️ --:--</span>
          </div>
        </div>
        <div class="cta-row">
          <span class="badge" id="authBadge">👤 Гость</span>
        </div>
      </div>
      <div id="content"></div>
    </main>
  </div>

  <div id="toastWrap" class="toast-wrap"></div>

  <img src="19.jpg" id="egg1" class="easter-egg-img" alt="Easter egg 1">
  <img src="20.jpg" id="egg2" class="easter-egg-img" alt="Easter egg 2">
  <audio id="easterAudio" src="machomen.mp3" preload="auto"></audio>

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD9s6IQpLLYFUztsZOTc-arHQ0zTIobwOA",
      authDomain: "marta-test-8b57d.firebaseapp.com",
      projectId: "marta-test-8b57d",
      storageBucket: "marta-test-8b57d.firebasestorage.app",
      messagingSenderId: "531675844111",
      appId: "1:531675844111:web:9cdfd959072b145b251d7a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    db.enablePersistence().catch(err => console.log('Persistence:', err.message));

    (function () {
      const contentDiv = document.getElementById('content');
      const btnHome = document.getElementById('btnHome');
      const btnSend = document.getElementById('btnSend');
      const btnSearch = document.getElementById('btnSearch');
      const btnModeration = document.getElementById('btnModeration');
      const themeToggle = document.getElementById('themeToggle');
      const topStatus = document.getElementById('topStatus');
      const authBadge = document.getElementById('authBadge');
      const clockBadge = document.getElementById('clockBadge');
      const audio = document.getElementById('easterAudio');
      const egg1 = document.getElementById('egg1');
      const egg2 = document.getElementById('egg2');
      const toastWrap = document.getElementById('toastWrap');

      const MODERATOR_EMAILS = [
        'yurapon11972020@gmail.com',
        'yraslavskibididobi@mail.ru',
        'iluhamoder@mail.ru',
        'danilsupervpn@mail.ru',
        'skvizzymedium@mail.ru',
        'dlaprepodov@mail.ru'
      ].map(email => email.toLowerCase());

      const POST_COOLDOWN = 5 * 60 * 1000;
      const DRAFT_KEY = 'greeting_draft_v2';
      const LAST_TAB_KEY = 'last_tab_v2';
      const STATS_CACHE_KEY = 'stats_cache_v2';
      const STATS_CACHE_TTL = 5 * 60 * 1000;
      const LAST_UPDATE_KEY = 'last_update_v2';

      let clickCount = 0;
      let firstClickTime = 0;
      let easterEggActive = false;
      let currentEggIndex = 1;

      function escapeHtml(value) {
        if (!value) return '';
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function setTopStatus(text) {
        topStatus.textContent = text;
      }

      function toast(message, type = 'info', timeout = 2600) {
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = message;
        toastWrap.appendChild(el);
        setTimeout(() => {
          el.remove();
        }, timeout);
      }

      function pulseHearts() {
        for (let i = 0; i < 8; i++) {
          setTimeout(() => {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = '💖';
            heart.style.left = Math.round(Math.random() * 80 + 10) + 'vw';
            heart.style.top = Math.round(Math.random() * 40 + 40) + 'vh';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1800);
          }, i * 80);
        }
      }

      function updateClock() {
        const now = new Date();
        clockBadge.textContent = '⏱️ ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      updateClock();
      setInterval(updateClock, 1000 * 30);

      function applyTheme(theme) {
        const dark = theme === 'dark';
        document.body.classList.toggle('dark-theme', dark);
        localStorage.setItem('theme', dark ? 'dark' : 'light');
        themeToggle.textContent = dark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
      }

      applyTheme(localStorage.getItem('theme') === 'dark' ? 'dark' : 'light');

      themeToggle.addEventListener('click', () => {
        const next = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
        applyTheme(next);

        const now = Date.now();
        if (!firstClickTime || now - firstClickTime > 2000) {
          firstClickTime = now;
          clickCount = 1;
        } else {
          clickCount += 1;
        }

        if (clickCount >= 5 && !easterEggActive) {
          showEasterEgg();
          clickCount = 0;
          firstClickTime = 0;
        }
      });

      function showEasterEgg() {
        if (easterEggActive) return;
        easterEggActive = true;
        const currentEgg = currentEggIndex === 1 ? egg1 : egg2;
        currentEgg.style.display = 'block';
        currentEgg.classList.add('show');
        audio.currentTime = 0;
        audio.play().catch(() => {});
        setTimeout(() => {
          currentEgg.classList.remove('show');
          currentEgg.style.display = 'none';
          easterEggActive = false;
          currentEggIndex = currentEggIndex === 1 ? 2 : 1;
        }, 4200);
      }

      function setActiveButton(activeId) {
        [btnHome, btnSend, btnSearch].forEach(btn => btn.classList.remove('active'));
        if (activeId === 'btnHome') btnHome.classList.add('active');
        if (activeId === 'btnSend') btnSend.classList.add('active');
        if (activeId === 'btnSearch') btnSearch.classList.add('active');
        localStorage.setItem(LAST_TAB_KEY, activeId);
      }

      function isAdmin() {
        const user = auth.currentUser;
        return !!(user && user.email && MODERATOR_EMAILS.includes(user.email.toLowerCase()));
      }

      function getLastPostTime() {
        return parseInt(localStorage.getItem('lastPostTime') || '0', 10);
      }

      function setLastPostTime() {
        localStorage.setItem('lastPostTime', Date.now().toString());
      }

      function canPost() {
        if (isAdmin()) return true;
        return (Date.now() - getLastPostTime()) >= POST_COOLDOWN;
      }

      function getRemainingSeconds() {
        if (isAdmin()) return 0;
        return Math.max(0, Math.ceil((POST_COOLDOWN - (Date.now() - getLastPostTime())) / 1000));
      }

      function getUserId() {
        if (auth.currentUser) return 'user_' + auth.currentUser.uid;
        let sessionId = localStorage.getItem('session_id');
        if (!sessionId) {
          sessionId = 'session_' + Math.random().toString(36).slice(2) + Date.now();
          localStorage.setItem('session_id', sessionId);
        }
        return sessionId;
      }

      async function logModeratorAction(action, details, docId = null) {
        if (!isAdmin()) return;
        try {
          await db.collection('logs').add({
            moderator: auth.currentUser.email,
            action,
            details,
            documentId: docId,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (error) {
          console.error('log error', error);
        }
      }

      function invalidateStatsCache() {
        localStorage.removeItem(STATS_CACHE_KEY);
      }

      async function getStats() {
        const cached = localStorage.getItem(STATS_CACHE_KEY);
        if (cached) {
          try {
            const parsed = JSON.parse(cached);
            if (Date.now() - parsed.timestamp < STATS_CACHE_TTL) return parsed.data;
          } catch {}
        }

        const [totalSnap, approvedSnap, pendingSnap, topSnap] = await Promise.all([
          db.collection('congratulations').get(),
          db.collection('congratulations').where('approved', '==', true).get(),
          db.collection('congratulations').where('approved', '==', false).get(),
          db.collection('congratulations').where('approved', '==', true).orderBy('likes', 'desc').limit(1).get().catch(() => ({ docs: [] }))
        ]);

        const data = {
          total: totalSnap.size,
          approved: approvedSnap.size,
          pending: pendingSnap.size,
          bestLikes: topSnap.docs?.[0]?.data()?.likes || 0
        };

        localStorage.setItem(STATS_CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data }));
        return data;
      }

      async function addCongratulation(from, to, category, message) {
        const docRef = await db.collection('congratulations').add({
          from,
          to,
          category,
          message,
          date: firebase.firestore.FieldValue.serverTimestamp(),
          approved: false,
          likes: 0
        });
        invalidateStatsCache();
        return docRef.id;
      }

      async function updateCongratulation(id, data) {
        await db.collection('congratulations').doc(id).update(data);
        invalidateStatsCache();
      }

      async function deleteCongratulation(id) {
        await db.collection('congratulations').doc(id).delete();
        invalidateStatsCache();
      }

      async function likeCongratulation(postId) {
        const userId = getUserId();
        const likeId = `${postId}_${userId}`;

        await db.runTransaction(async transaction => {
          const likeRef = db.collection('likes').doc(likeId);
          const existing = await transaction.get(likeRef);
          if (existing.exists) {
            throw new Error('already liked');
          }
          transaction.set(likeRef, {
            postId,
            userId,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          transaction.update(db.collection('congratulations').doc(postId), {
            likes: firebase.firestore.FieldValue.increment(1)
          });
        });

        localStorage.setItem(`liked_${postId}_${userId}`, 'true');
      }

      async function getUserLikesForPosts(postIds) {
        if (!postIds.length) return {};
        const userId = getUserId();
        const result = {};
        const uncached = [];
        for (const id of postIds) {
          if (localStorage.getItem(`liked_${id}_${userId}`) === 'true') result[id] = true;
          else uncached.push(id);
        }
        for (let i = 0; i < uncached.length; i += 10) {
          const chunk = uncached.slice(i, i + 10);
          const snap = await db.collection('likes')
            .where('userId', '==', userId)
            .where('postId', 'in', chunk)
            .get();
          snap.forEach(doc => {
            const data = doc.data();
            result[data.postId] = true;
            localStorage.setItem(`liked_${data.postId}_${userId}`, 'true');
          });
        }
        return result;
      }

      function normalizePost(doc) {
        return { id: doc.id, ...doc.data() };
      }

      async function loadRecentApproved(limit = 4, startAfterDoc = null) {
        let query = db.collection('congratulations')
          .where('approved', '==', true)
          .orderBy('date', 'desc')
          .limit(limit);
        if (startAfterDoc) query = query.startAfter(startAfterDoc);
        const snap = await query.get();
        return {
          items: snap.docs.map(normalizePost),
          lastDoc: snap.docs[snap.docs.length - 1] || null
        };
      }

      async function loadAllApproved(forceServer = false) {
        const query = db.collection('congratulations')
          .where('approved', '==', true)
          .orderBy('date', 'desc');
        const snap = forceServer ? await query.get({ source: 'server' }) : await query.get();
        localStorage.setItem(LAST_UPDATE_KEY, Date.now().toString());
        return snap.docs.map(normalizePost);
      }

      async function loadTopApproved(limit = 3) {
        const snap = await db.collection('congratulations')
          .where('approved', '==', true)
          .orderBy('likes', 'desc')
          .orderBy('date', 'desc')
          .limit(limit)
          .get()
          .catch(() => ({ docs: [] }));
        return snap.docs.map(normalizePost);
      }

      async function getUnapprovedCongrats() {
        const snap = await db.collection('congratulations')
          .where('approved', '==', false)
          .orderBy('date', 'desc')
          .get()
          .catch(() => db.collection('congratulations').where('approved', '==', false).get());
        return snap.docs.map(normalizePost);
      }

      async function getAllCongrats() {
        const snap = await db.collection('congratulations')
          .orderBy('date', 'desc')
          .limit(100)
          .get();
        return snap.docs.map(normalizePost);

      function formatDate(timestamp) {
        if (!timestamp?.seconds) return 'Дата скоро появится';

      function getShareUrl(id) {

      async function copyText(value) {
        try {
          await navigator.clipboard.writeText(value);
          return true;
        } catch {
          const area = document.createElement('textarea');
          area.value = value;
          document.body.appendChild(area);
          area.select();
          const ok = document.execCommand('copy');
          area.remove();
          return ok;
        }
      }

      function debounce(fn, delay = 260) {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), delay);
        };
      }

      function sortCongrats(items, sortBy) {
        const sorted = [...items];
        switch (sortBy) {
          case 'date_asc': sorted.sort((a,b) => (a.date?.seconds || 0) - (b.date?.seconds || 0)); break;
          case 'likes_desc': sorted.sort((a,b) => (b.likes || 0) - (a.likes || 0)); break;
          case 'likes_asc': sorted.sort((a,b) => (a.likes || 0) - (b.likes || 0)); break;
          case 'from_asc': sorted.sort((a,b) => (a.from || '').localeCompare(b.from || '', 'ru')); break;
          case 'to_asc': sorted.sort((a,b) => (a.to || '').localeCompare(b.to || '', 'ru')); break;
          default: sorted.sort((a,b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
        }
        return sorted;
      }

      }

        }

        async function display() {
          const q = input.value.trim().toLowerCase();
          const selectedCategory = category.value;
          const selectedSort = sort.value;
          const selectedLimit = parseInt(limit.value, 10);

          let filtered = allItems.filter(item => {
            const haystack = `${item.from || ''} ${item.to || ''} ${item.message || ''}`.toLowerCase();
            const categoryOk = selectedCategory === 'all' || item.category === selectedCategory;
            const queryOk = !q || haystack.includes(q);
            return categoryOk && queryOk;
          });

          filtered = sortCongrats(filtered, selectedSort).slice(0, selectedLimit);
          await renderPostCards(results, filtered);
          highlightFromHash();
        }

        const debouncedDisplay = debounce(display, 180);
        [input, category, sort, limit].forEach(el => {
          el.addEventListener('input', debouncedDisplay);
          el.addEventListener('change', display);
        });

        refreshBtn.addEventListener('click', async () => {
          try {
            allItems = await loadAllApproved(true);
            updateLastUpdateLabel();
            await display();
            toast('Данные обновлены с сервера', 'success');
          } catch (error) {
            toast('Не удалось обновить данные', 'error');
          }
        });

        try {
          allItems = await loadAllApproved(false);
          updateLastUpdateLabel();
          await display();
          setTopStatus('Поиск готов');
        } catch (error) {
          console.error(error);
          results.innerHTML = '<div class="empty">Не удалось загрузить поздравления.</div>';
          setTopStatus('Ошибка загрузки поиска');
        }
      }

      async function renderModeration() {
        setTopStatus('Открыта панель модерации');

        if (!isAdmin()) {
          contentDiv.innerHTML = `
            <section class="grid-2">
              <div class="card">
                <div class="section-title">🛡️ Вход для модератора</div>
                <div class="subtle">Используй email модератора из Firebase Authentication.</div>
                <div class="auth-box">
                  <input id="adminEmail" type="email" placeholder="Email модератора">
                  <input id="adminPass" type="password" placeholder="Пароль">
                  <button class="btn" id="loginAdminBtn">Войти</button>
                </div>
              </div>
              <div class="card">
                <div class="section-title">🌷 Модераторы</div>
                <div class="helper-box">Усатов Тимофей, Илья Говтва, Ярослав Носков, Вадим Муллаголиев, Данила Сарычев.</div>
                <div class="helper-box">После входа здесь можно одобрять, редактировать и удалять записи без изменения старой базы данных.</div>
              </div>
            </section>
          `;

          document.getElementById('loginAdminBtn').addEventListener('click', async () => {
            const email = document.getElementById('adminEmail').value.trim();
            const pass = document.getElementById('adminPass').value;
            if (!email || !pass) {
              toast('Заполни email и пароль', 'error');
              return;
            }
            try {
              await auth.signInWithEmailAndPassword(email, pass);
              toast('Вход выполнен', 'success');
              renderModeration();
            } catch (error) {
              toast('Ошибка входа: ' + error.message, 'error', 3600);
            }
          });
          return;
        }

        contentDiv.innerHTML = `
          <section class="card section">
            <div class="section-header">
              <div>
                <div class="section-title">🛡️ Панель модератора</div>
                <div class="subtle">Редактирование, публикация и удаление записей в существующих коллекциях.</div>
              </div>
              <div class="toolbar">
                <span class="badge">✅ ${escapeHtml(auth.currentUser.email || '')}</span>
                <button class="btn secondary" id="logoutBtn">Выйти</button>
              </div>
            </div>
            <div class="moderation-tabs">
              <button class="btn secondary active-tab" id="tabNew">Новые</button>
              <button class="btn secondary" id="tabAll">Все записи</button>
            </div>
            <div id="moderationContent" class="moderation-grid"></div>
          </section>
        `;

        document.getElementById('logoutBtn').addEventListener('click', async () => {
          await auth.signOut();
          toast('Выход выполнен', 'info');
          renderModeration();
        });

        const tabNew = document.getElementById('tabNew');
        const tabAll = document.getElementById('tabAll');
        const moderationContent = document.getElementById('moderationContent');

        async function renderModerationItems(items, mode) {
          if (!items.length) {
            moderationContent.innerHTML = '<div class="empty">Здесь пока пусто.</div>';
            return;
          }

          moderationContent.innerHTML = items.map(item => `
            <div class="moderation-item" data-id="${item.id}">
              <div class="meta-line">
                <span>${escapeHtml(formatDate(item.date))}</span>
                <span>${item.approved ? '✅ Одобрено' : '⏳ На модерации'}</span>
                <span>❤️ ${item.likes || 0}</span>
              </div>
              <div class="inline-edit">
                <input class="edit-from" value="${escapeHtml(item.from)}" placeholder="От кого">
                <input class="edit-to" value="${escapeHtml(item.to)}" placeholder="Кому">
                <select class="edit-category">
                  <option value="teacher" ${item.category === 'teacher' ? 'selected' : ''}>👩‍🏫 Преподаватель</option>
                  <option value="classmate" ${item.category === 'classmate' ? 'selected' : ''}>👥 Одногруппник</option>
                </select>
                <textarea class="edit-message" placeholder="Текст">${escapeHtml(item.message)}</textarea>
              </div>
              <div class="split-actions">
                <button class="btn success save-btn">💾 Сохранить</button>
                ${!item.approved ? '<button class="btn" data-role="approve">✅ Одобрить</button>' : ''}
                <button class="btn danger delete-btn">🗑️ Удалить</button>
              </div>
            </div>
          `).join('');

          moderationContent.querySelectorAll('.save-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              const root = btn.closest('.moderation-item');
              const id = root.dataset.id;
              const from = root.querySelector('.edit-from').value.trim();
              const to = root.querySelector('.edit-to').value.trim();
              const category = root.querySelector('.edit-category').value;
              const message = root.querySelector('.edit-message').value.trim();
              if (!from || !to || !message) {
                toast('Заполни все поля перед сохранением', 'error');
                return;
              }
              try {
                await updateCongratulation(id, { from, to, category, message });
                await logModeratorAction('edit', 'Изменил запись', id);
                toast('Запись сохранена', 'success');
              } catch (error) {
                toast('Ошибка сохранения', 'error');
              }
            });
          });

          moderationContent.querySelectorAll('[data-role="approve"]').forEach(btn => {
            btn.addEventListener('click', async () => {
              const id = btn.closest('.moderation-item').dataset.id;
              try {
                await updateCongratulation(id, { approved: true });
                await logModeratorAction('approve', 'Одобрил запись', id);
                toast('Запись одобрена', 'success');
                if (mode === 'new') loadNew();
                else loadAll();
              } catch (error) {
                toast('Ошибка одобрения', 'error');
              }
            });
          });

          moderationContent.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              const id = btn.closest('.moderation-item').dataset.id;
              if (!confirm('Точно удалить это поздравление?')) return;
              try {
                await deleteCongratulation(id);
                await logModeratorAction('delete', 'Удалил запись', id);
                toast('Запись удалена', 'success');
                if (mode === 'new') loadNew();
                else loadAll();
              } catch (error) {
                toast('Ошибка удаления', 'error');
              }
            });
          });
        }

        async function loadNew() {
          tabNew.classList.add('active-tab');
          tabAll.classList.remove('active-tab');
          moderationContent.innerHTML = '<div class="skeletons"><div class="skeleton"></div></div>';
          try {
            const items = await getUnapprovedCongrats();
            await renderModerationItems(items, 'new');
          } catch (error) {
            moderationContent.innerHTML = '<div class="empty">Не удалось загрузить новые записи.</div>';
          }
        }

        async function loadAll() {
          tabAll.classList.add('active-tab');
          tabNew.classList.remove('active-tab');
          moderationContent.innerHTML = '<div class="skeletons"><div class="skeleton"></div></div>';
          try {
            const items = await getAllCongrats();
            await renderModerationItems(items, 'all');
          } catch (error) {
            moderationContent.innerHTML = '<div class="empty">Не удалось загрузить список записей.</div>';
          }
        }

        tabNew.addEventListener('click', loadNew);
        tabAll.addEventListener('click', loadAll);
        loadNew();
      }

      function highlightFromHash() {
        const match = (window.location.hash || '').match(/congratulation=([^&]+)/);
        if (!match) return;
        const id = match[1];
        document.querySelectorAll('.post-card.highlight').forEach(el => el.classList.remove('highlight'));
        const target = document.getElementById('post-' + id);
        if (target) {
          target.classList.add('highlight');
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }

      auth.onAuthStateChanged(user => {
        authBadge.textContent = user ? `👤 ${user.email}` : '👤 Гость';
        btnModeration.textContent = user && isAdmin() ? '🛡️ Модерация (admin)' : '🛡️ Модерация';
      });

      btnHome.addEventListener('click', renderHome);
      btnSend.addEventListener('click', renderSend);
      btnSearch.addEventListener('click', renderSearch);
      btnModeration.addEventListener('click', renderModeration);
      window.addEventListener('hashchange', highlightFromHash);

      const initialTab = localStorage.getItem(LAST_TAB_KEY) || 'btnHome';
      if (initialTab === 'btnSend') renderSend();
      else if (initialTab === 'btnSearch') renderSearch();
      else renderHome();
    })();
  </script>
</body>
</html>
