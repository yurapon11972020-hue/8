<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Поздравления с 8 марта</title>
  <style>
    :root {
      --bg: #f7f4f6;
      --panel: #ffffff;
      --panel-2: #fbf8fa;
      --text: #1f1a1d;
      --muted: #7b6d76;
      --line: #e9dfe5;
      --accent: #c76b8a;
      --accent-soft: #f6e6ed;
      --shadow: 0 10px 30px rgba(35, 20, 28, 0.06);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #faf7f9 0%, #f4eff2 100%);
      min-height: 100vh;
    }

    .wrap {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 16px 56px;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      max-width: 720px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr .9fr auto;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 18px;
      position: sticky;
      top: 12px;
      z-index: 10;
    }

    .field {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      outline: none;
      transition: border-color .2s, background .2s;
    }

    .field:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .button {
      border: 0;
      background: var(--accent);
      color: #fff;
      border-radius: 16px;
      padding: 0 18px;
      min-height: 48px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    .button:hover { transform: translateY(-1px); }
    .button:active { transform: translateY(0); }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(35, 20, 28, 0.09);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .to {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .from {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .date {
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
    }

    .message {
      margin: 0;
      font-size: 16px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty, .loading {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .load-more-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }

    @media (max-width: 760px) {
      .wrap { padding-top: 18px; }
      .hero { padding: 22px; border-radius: 22px; }
      .toolbar {
        grid-template-columns: 1fr;
        position: static;
      }
      .button { width: 100%; }
      .card-top { flex-direction: column; }
      .date { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Поздравления с 8 марта</h1>
      <p>Только просмотр поздравлений — без лишних блоков, лишней информации и лишних действий.</p>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="field" type="text" placeholder="Поиск по имени, отправителю или тексту" />
      <select id="sortSelect" class="field">
        <option value="date_desc">Сначала новые</option>
        <option value="date_asc">Сначала старые</option>
        <option value="to_asc">По получателю А–Я</option>
        <option value="from_asc">По отправителю А–Я</option>
      </select>
      <button id="refreshBtn" class="button">Обновить</button>
    </section>

    <div class="meta">
      <div id="countLabel">Загрузка...</div>
      <div id="updatedLabel"></div>
    </div>

    <main id="list" class="list">
      <div class="loading">Загрузка поздравлений...</div>
    </main>

    <div class="load-more-wrap">
      <button id="loadMoreBtn" class="button ghost" style="display:none;">Показать ещё</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBw8OCvgXEqj0ZVPuFMMg3DTR5BfpYnNKk",
      authDomain: "marta-ebc25.firebaseapp.com",
      projectId: "marta-ebc25",
      storageBucket: "marta-ebc25.firebasestorage.app",
      messagingSenderId: "659204675048",
      appId: "1:659204675048:web:b9e6b6f414439e5aa3005d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const listEl = document.getElementById('list');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const refreshBtn = document.getElementById('refreshBtn');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const countLabel = document.getElementById('countLabel');
    const updatedLabel = document.getElementById('updatedLabel');

    let allItems = [];
    let filteredItems = [];
    let visibleCount = 12;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeText(v) {
      return String(v ?? '').toLowerCase().trim();
    }

    function formatDate(dateField) {
      if (!dateField) return '';
      try {
        const date = dateField.seconds ? new Date(dateField.seconds * 1000) : new Date(dateField);
        if (Number.isNaN(date.getTime())) return '';
        return date.toLocaleString('ru-RU');
      } catch {
        return '';
      }
    }

    function sortItems(items, mode) {
      const arr = [...items];
      if (mode === 'date_asc') {
        arr.sort((a, b) => (a._time || 0) - (b._time || 0));
      } else if (mode === 'to_asc') {
        arr.sort((a, b) => (a.to || '').localeCompare(b.to || '', 'ru'));
      } else if (mode === 'from_asc') {
        arr.sort((a, b) => (a.from || '').localeCompare(b.from || '', 'ru'));
      } else {
        arr.sort((a, b) => (b._time || 0) - (a._time || 0));
      }
      return arr;
    }

    function render() {
      const query = normalizeText(searchInput.value);
      const sorted = sortItems(allItems.filter(item => {
        if (!query) return true;
        const hay = [item.to, item.from, item.message].map(normalizeText).join(' ');
        return hay.includes(query);
      }), sortSelect.value);

      filteredItems = sorted;
      countLabel.textContent = query
        ? `Найдено: ${filteredItems.length}`
        : `Всего поздравлений: ${filteredItems.length}`;

      if (!filteredItems.length) {
        listEl.innerHTML = '<div class="empty">Ничего не найдено.</div>';
        loadMoreBtn.style.display = 'none';
        return;
      }

      const visible = filteredItems.slice(0, visibleCount);
      listEl.innerHTML = visible.map(item => {
        const date = formatDate(item.date);
        return `
          <article class="card">
            <div class="card-top">
              <div>
                <h2 class="to">${escapeHtml(item.to || 'Без имени')}</h2>
                <p class="from">От: ${escapeHtml(item.from || 'Аноним')}</p>
              </div>
              <div class="date">${escapeHtml(date)}</div>
            </div>
            <p class="message">${escapeHtml(item.message || '')}</p>
          </article>
        `;
      }).join('');

      loadMoreBtn.style.display = visibleCount < filteredItems.length ? 'inline-flex' : 'none';
    }

    async function loadApproved() {
      listEl.innerHTML = '<div class="loading">Загрузка поздравлений...</div>';
      countLabel.textContent = 'Загрузка...';

      try {
        let docs = [];

        try {
          const snapshot = await db.collection('congratulations').where('approved', '==', true).get();
          docs = snapshot.docs;
        } catch (e) {
          console.warn('Approved query failed, using fallback:', e);
        }

        if (!docs.length) {
          const fallback = await db.collection('congratulations').get();
          docs = fallback.docs.filter(doc => {
            const data = doc.data() || {};
            return data.approved === true || data.status === 'approved';
          });
        }

        allItems = docs.map(doc => {
          const data = doc.data() || {};
          const seconds = data.date && data.date.seconds ? data.date.seconds : 0;
          return {
            id: doc.id,
            from: data.from || '',
            to: data.to || '',
            message: data.message || '',
            date: data.date || null,
            approved: data.approved,
            _time: seconds
          };
        });

        visibleCount = 12;
        updatedLabel.textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        render();
      } catch (error) {
        console.error(error);
        listEl.innerHTML = '<div class="empty">Не удалось загрузить поздравления. Проверь Firebase и подключение.</div>';
        countLabel.textContent = 'Ошибка загрузки';
      }
    }

    let debounceId = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(debounceId);
      debounceId = setTimeout(() => {
        visibleCount = 12;
        render();
      }, 150);
    });

    sortSelect.addEventListener('change', () => {
      visibleCount = 12;
      render();
    });

    refreshBtn.addEventListener('click', loadApproved);
    loadMoreBtn.addEventListener('click', () => {
      visibleCount += 12;
      render();
    });

    loadApproved();
  </script>
</body>
</html>
